  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro: #0a0a0a;
      --amarillo: #F5A623;
      --rojo: #C0392B;
      --blanco: #f0ead6;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Special Elite', cursive;
      cursor: crosshair;
    }

    /* ══ PORTADA ══ */
    #portada {
      width: 100vw; height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    @keyframes pulsar-texto {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    #btn-comenzar {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Bangers', cursive;
      font-size: 32px;
      letter-spacing: 5px;
      color: var(--negro);
      background: var(--amarillo);
      border: 4px solid var(--negro);
      padding: 16px 56px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 6px 6px 0 var(--negro);
      opacity: 1;
      pointer-events: all;
      animation: pulsar-btn 1.5s ease-in-out infinite;
    }

    #btn-comenzar:hover {
      transform: translateX(-50%) translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--negro);
    }

    @keyframes pulsar-btn {
      0%, 100% { box-shadow: 6px 6px 0 var(--negro); }
      50% { box-shadow: 8px 8px 0 var(--negro); }
    }

    /* ══ ESCENA ══ */
    #escena {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-image: url('img/fondo_abajo.png');
      background-size: cover;
      background-position: center;
    }

    #escena-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
      display: none;
    }

    #escena-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
    }

    /* ══ DIÁLOGO ══ */
    #dialogo {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      z-index: 3;
      padding: 0 48px 36px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #dialogo.visible {
      opacity: 1;
    }

    #capitulo-label {
      font-family: 'Bangers', cursive;
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--negro);
      background: var(--rojo);
      text-transform: uppercase;
      padding: 6px 12px;
      margin-bottom: 8px;
      display: inline-block;
      box-shadow: 3px 3px 0 var(--negro);
    }

    #caja-texto {
      background: rgba(10, 10, 10, 0.93);
      border: 4px solid var(--negro);
      outline: 2px solid var(--amarillo);
      box-shadow: 8px 8px 0 var(--negro);
      padding: 16px 24px;
      margin-bottom: 16px;
      height: 100px;
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #texto-contenedor {
      font-size: 20px;
      line-height: 1.6;
      color: var(--amarillo);
      white-space: pre-wrap;
    }

    #paginador {

      right: 16px;
      font-family: 'Bangers', cursive;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--amarillo);

      right: 16px;
      font-family: 'Bangers', cursive;
      font-size: 20px;
      color: var(--amarillo);
      display: none;
      animation: pulsar-texto 0.8s ease-in-out infinite;

      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .opciones-caja {

      background: var(--amarillo);

      display: inline-flex;

      gap: 12px;

      font-family: 'Bangers', cursive;

      color: var(--negro);
      background: var(--blanco);

    }

      color: var(--blanco);
      transform: translate(2px, 2px) scale(1.04);
      box-shadow: 2px 2px 0 var(--negro);

      transform: translate(4px, 4px) scale(0.97);

    /* ══ FLASH ══ */
    #flash-panel {

      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.15s;

// ── AUDIO ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sonarClick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(520, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(260, audioCtx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function sonarMaquina() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(900, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.025);
  osc.start(); osc.stop(audioCtx.currentTime + 0.025);
}

// ── PORTADA ──
function iniciarJuego(e) {
  e.stopPropagation();
  sonarClick();
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  flashTransicion(() => {
    document.getElementById('portada').style.display = 'none';
    document.getElementById('escena').style.display = 'block';
    irA('inicio');
  });
}

function flashTransicion(cb) {
  const panel = document.getElementById('flash-panel');
  panel.style.opacity = '1';
  setTimeout(() => {
    if (cb) cb();
    setTimeout(() => { panel.style.opacity = '0'; }, 80);
  }, 150);

// ── MOTOR ──
let paginas = [];
let paginaActual = 0;
let nodoActual = null;

function irA(id) {
  const nodo = nodos[id];
  if (!nodo) return;
  nodoActual = nodo;

  paginas = nodo.texto
    .split(/\n{2,}/)
    .map(p => p.trim())
    .filter(p => p.length > 0);
  paginaActual = 0;

  flashTransicion(() => {
    const dialogo = document.getElementById('dialogo');
    const bg = document.getElementById('escena-bg');
    const vid = document.getElementById('escena-video');

    dialogo.classList.remove('visible');
    document.getElementById('capitulo-label').textContent = nodo.capitulo || '';

    const opciones = document.getElementById('opciones');
    opciones.classList.remove('visible');
    opciones.innerHTML = '';
    document.getElementById('indicador').style.display = 'none';
    document.getElementById('texto-contenedor').textContent = '';
    document.getElementById('paginador').textContent = '';

    // Detectar si es video o imagen
    const esVideo = (nodo.imagen || '').match(/\.(mp4|webm|mov)$/i);
    if (esVideo) {
      bg.style.display = 'none';
      vid.style.display = 'block';
      vid.src = nodo.imagen;
      vid.load();
      vid.play().catch(() => {});
    } else {
      vid.style.display = 'none';
      vid.src = '';
      bg.style.display = 'block';
      bg.src = nodo.imagen || '';
    }

    // Mostrar diálogo después de 1.2 segundos
    setTimeout(() => {
      dialogo.classList.add('visible');
      mostrarPagina();
    }, 1200);
  });
}

function mostrarPagina() {
  const contenedor = document.getElementById('texto-contenedor');
  const paginador = document.getElementById('paginador');
  const indicador = document.getElementById('indicador');
  const opciones = document.getElementById('opciones');

  const esUltima = paginaActual === paginas.length - 1;

  contenedor.textContent = paginas[paginaActual];

  if (paginas.length > 1) {
    paginador.textContent = `${paginaActual + 1} / ${paginas.length}`;
  } else {
    paginador.textContent = '';
  }

  if (esUltima) {
    indicador.style.display = 'none';
    mostrarOpciones(nodoActual, opciones);
  } else {
    indicador.style.display = 'block';
    opciones.classList.remove('visible');
    opciones.innerHTML = '';
  }
}

function saltarEscritura() {
  if (paginaActual < paginas.length - 1) {
    sonarClick();
    paginaActual++;
    mostrarPagina();
  }
}

function mostrarOpciones(nodo, opciones) {
  if (opciones.querySelector('.opciones-caja')) return;
  const caja = document.createElement('div');
  caja.className = 'opciones-caja';
  const lbl = document.createElement('div');
  lbl.className = 'opciones-caja-label';
  lbl.textContent = '¿QUÉ HACÉS?';
  caja.appendChild(lbl);
  nodo.opciones.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'opcion-btn';
    btn.textContent = op.texto;
    btn.onclick = () => { sonarClick(); irA(op.destino); };
    caja.appendChild(btn);
  });
  opciones.appendChild(caja);
  opciones.classList.add('visible');
}
</script>
</body>
</html>
