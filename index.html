<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sonarClick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(520, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(260, audioCtx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function sonarMaquina() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(900, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.025);
  osc.start(); osc.stop(audioCtx.currentTime + 0.025);
}

let fasePortada = 1;

function clickPortada() {
  if (fasePortada !== 1) return;
  fasePortada = 2;
  sonarClick();
  const p = document.getElementById('portada');
  p.classList.add('fase2');

}

function iniciarJuego(e) {
  e.stopPropagation();
  sonarClick();
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  flashTransicion(() => {
    document.getElementById('portada').style.display = 'none';
    document.getElementById('escena').style.display = 'block';
    irA('inicio');
  });
}

function flashTransicion(cb) {
  const panel = document.getElementById('flash-panel');
  panel.style.opacity = '1';
  setTimeout(() => {
    if (cb) cb();
    setTimeout(() => { panel.style.opacity = '0'; }, 80);
  }, 150);
}

Mañana va a ser otro día difícil. Pero hoy, por una vez, ganaron.`,
    opciones: [
      { texto: "↩ Volver al inicio", destino: "inicio" },
    ]
  },

  final_lucha: {
    capitulo: "Final · La lucha sin cesar",
    imagen: "img/abrazo_claudio_su_nieta.png",
    texto: `No hubo respuesta oficial.

Doña Elena vuelve a su casa en el colectivo, de pie porque no hay asientos, con los pies que le pesan y el cartel doblado bajo el brazo.

Sancho la acompaña hasta su parada.

— ¿Y ahora? — pregunta ella.

— Ahora descansamos. El jueves hay otra convocatoria.

Se despiden en la esquina. Dos personas mayores bajo la luz anaranjada de la tarde.

Doña Elena sube las escaleras de su casa despacio. Calienta agua. Prepara el mate.

Mañana vuelve a empezar. Y eso, piensa, también es una forma de ganar.`,
    opciones: [
      { texto: "↩ Volver al inicio", destino: "inicio" },
    ]
  },

};

let paginas = [];
let paginaActual = 0;
let nodoActual = null;

function irA(id) {
  const nodo = nodos[id];
  if (!nodo) return;
  nodoActual = nodo;

  paginas = nodo.texto
    .split(/\n{2,}/)
    .map(p => p.trim())
    .filter(p => p.length > 0);
  paginaActual = 0;

  flashTransicion(() => {
    const dialogo = document.getElementById('dialogo');

    // Ocultar dialogo y mostrar solo la imagen
    dialogo.classList.remove('visible');
    document.getElementById('escena-bg').src = nodo.imagen || '';
    document.getElementById('capitulo-label').textContent = nodo.capitulo || '';

    const opciones = document.getElementById('opciones');
    opciones.classList.remove('visible');
    opciones.innerHTML = '';
    document.getElementById('indicador').style.display = 'none';
    document.getElementById('texto-contenedor').textContent = '';
    document.getElementById('paginador').textContent = '';

    // Aparecer el dialogo después de 1.2 segundos
    setTimeout(() => {
      dialogo.classList.add('visible');
      mostrarPagina();
    }, 1200);
  });
}

function mostrarPagina() {
  const contenedor = document.getElementById('texto-contenedor');
  const paginador = document.getElementById('paginador');
  const indicador = document.getElementById('indicador');
  const opciones = document.getElementById('opciones');

  const esUltima = paginaActual === paginas.length - 1;

  contenedor.textContent = paginas[paginaActual];

  if (paginas.length > 1) {
    paginador.textContent = `${paginaActual + 1} / ${paginas.length}`;
  } else {
    paginador.textContent = '';
  }

  if (esUltima) {
    indicador.style.display = 'none';
    mostrarOpciones(nodoActual, opciones);
  } else {
    indicador.style.display = 'block';
    opciones.classList.remove('visible');
    opciones.innerHTML = '';
  }
}

function saltarEscritura() {
  if (paginaActual < paginas.length - 1) {
    sonarClick();
    paginaActual++;
    mostrarPagina();
  }
}

function mostrarOpciones(nodo, opciones) {
  if (opciones.querySelector('.opciones-caja')) return;
  const caja = document.createElement('div');
  caja.className = 'opciones-caja';
  const lbl = document.createElement('div');
  lbl.className = 'opciones-caja-label';
  lbl.textContent = '¿QUÉ HACÉS?';
  caja.appendChild(lbl);
  nodo.opciones.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'opcion-btn';
    btn.textContent = op.texto;
    btn.onclick = () => { sonarClick(); irA(op.destino); };
    caja.appendChild(btn);
  });
  opciones.appendChild(caja);
  opciones.classList.add('visible');
}
</script>
